name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y imagemagick
      - run: ls -la
      - run: mkdir -p app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi
      - run: convert icon_original.png -resize 48x48 app/src/main/res/mipmap-mdpi/ic_launcher.png
      - run: convert icon_original.png -resize 72x72 app/src/main/res/mipmap-hdpi/ic_launcher.png
      - run: convert icon_original.png -resize 96x96 app/src/main/res/mipmap-xhdpi/ic_launcher.png
      - run: convert icon_original.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
      - run: convert icon_original.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      - uses: android-actions/setup-android@v3
      - run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
